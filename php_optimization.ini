; PHP Optimization for Large Media Uploads & Processing
; Update your php.ini (e.g., /etc/php/8.2/fpm/php.ini and /etc/php/8.2/cli/php.ini)

; 1. Max Execution Time (Important for CLI/Queue Workers)
max_execution_time = 3600
max_input_time = 3600

; 2. Memory Limit (Important for FFmpeg buffering or large array processing)
memory_limit = 2G

; 3. Upload Limits (Used for fallback if S3 Direct Upload is disabled)
upload_max_filesize = 2G
post_max_size = 2G
max_file_uploads = 50

; 4. Network socket timeouts
default_socket_timeout = 3600
