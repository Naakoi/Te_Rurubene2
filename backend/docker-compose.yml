version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rurubene-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - rurubene

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - rurubene
    depends_on:
      - app

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - rurubene

networks:
  rurubene:
    driver: bridge
