# NGINX Optimization for Large Media Uploads
# Place these directives inside your server {} block or location / {} block

client_max_body_size 0; # Disable maximum body size checking, essential for large direct uploads
client_body_timeout 3600s; # Allow up to 1 hour for body transfer on slow networks
send_timeout 3600s; 
keepalive_timeout 3600s;

# Optimization for proxying to Laravel (PHP-FPM)
proxy_connect_timeout 3600s;
proxy_send_timeout 3600s;
proxy_read_timeout 3600s;
fastcgi_send_timeout 3600s;
fastcgi_read_timeout 3600s;

# Enable compression for text/JSON but NOT for binary media files
gzip on;
gzip_types text/plain application/json;
