# Serve the Next.js Frontend and proxy /api/ to Laravel on Port 8000
server {
    listen 80;
    server_name 91.99.89.94 _;

    # --- API: Proxy to Laravel backend ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large uploads
        proxy_connect_timeout 3600s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;

        # Body size for uploads
        client_max_body_size 0;
    }

    # --- Laravel Storage: Serve uploaded files directly (receipts, images, etc.) ---
    location /storage/ {
        alias /var/www/rurubene2/backend/public/storage/;
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public";
        client_max_body_size 0;
    }

    # --- Stripe Webhook passthrough to Laravel ---
    location /webhooks/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
    }

    # --- Frontend: Proxy to Next.js ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 0;
        client_body_timeout 3600s;
        send_timeout 3600s;
        keepalive_timeout 3600s;
    }
}

# Serve the Laravel Backend on Port 8000
server {
    listen 8000;
    server_name 91.99.89.94;
    root /var/www/rurubene2/backend/public;
    index index.php index.html index.htm;

    # Allow large uploads for the backend
    client_max_body_size 0;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
